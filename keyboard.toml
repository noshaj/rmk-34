[keyboard]
name = "rmk-ak34"
product_name = "rmk-ak34"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "Custom"
chip = "nrf52840"
usb_enable = true

[ble]
enabled = true

[storage]
enabled = true
start_addr = 0x000F8000
num_sectors = 2

[chip.nrf52840]
dcdc_reg0 = true
dcdc_reg1 = true

[matrix]
row_pins = ["P1_11", "P0_05", "P0_04"] # D6, D5, D4
col_pins = ["P0_31", "P0_20", "P0_09", "P0_10"] # D7, D8, D9, D10
row2col = true 

[[encoder]]
a = "P0_29" # D3
b = "P0_28" # D2
layout = [
    ["LBracket", "RBracket"], # Layer 0: [ and ]
    ["LBracket", "RBracket"],           # Layer 1: Volume Up/Down
    ["LBracket", "RBracket"],           # Layer 2: Mouse Scroll Up/Down
    ["LBracket", "RBracket"]          # Layer 3: Page Up/Down
]

[layout]
rows = 3
cols = 4
layers = 4
keymap = [
    # LAYER 0: Default
    [
        ["A", "B", "C", "D"],
        ["Kc1", "Kc2", "Kc3", "Kc4"],
        ["LCtrl", "MO(1)", "MO(2)", "Enter"]
    ],
    # LAYER 1: Hold MO(1)
    [
        ["F1", "F2", "F3", "F4"],
        ["_", "_", "_", "MO(3)"],
        ["_", "_", "_", "_"]
    ],
    # LAYER 2: Hold MO(2)
    [
        ["_", "_", "_", "-"],
        ["_", "_", "_", "_"],
        ["_", "_", "_", "_"]
    ],
    # LAYER 3: Hold MO(1) + MO(3)
    [
        ["_", "_", "_", "_"],
        ["_", "_", "_", "_"],
        ["_", "Bootloader", "Reset", "_"]
    ]
]
