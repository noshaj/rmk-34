[keyboard]
name = "rmk-ak34-safe"
# Use the direct chip name to avoid the template board error
chip = "nrf52840" 
vendor_id = 0x2886
product_id = 0x8045
usb_enable = false

[ble]
enabled = true

[storage]
enabled = false

[matrix]
row_pins = ["P0_04", "P0_05", "P1_11"]
col_pins = ["P1_15", "P1_14", "P1_13", "P1_12"]
row2col = true

[layout]
rows = 3
cols = 4
layers = 1
keymap = [
    [
        ["Bootloader", "Bootloader", "Bootloader", "Bootloader"],
        ["Bootloader", "Bootloader", "Bootloader", "Bootloader"],
        ["Bootloader", "Bootloader", "Bootloader", "Bootloader"]
    ]
]
