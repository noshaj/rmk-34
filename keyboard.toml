[keyboard]
name = "rmk-ak34-safe"
board = "XIAO BLE" 
vendor_id = 0x2886
product_id = 0x8045
manufacturer = "Custom"
usb_enable = true

[ble]
enabled = true

[storage]
# Keep disabled for the first run to prevent flash memory conflicts
enabled = false 

[matrix]
# Rows: D4, D5, D6 | Cols: D10, D9, D8, D7
row_pins = ["P0_04", "P0_05", "P1_11"]
col_pins = ["P1_15", "P1_14", "P1_13", "P1_12"]
row2col = true

[layout]
rows = 3
cols = 4
layers = 1
keymap = [
    [
        ["Bootloader", "Bootloader", "Bootloader", "Bootloader"],
        ["Bootloader", "Bootloader", "Bootloader", "Bootloader"],
        ["Bootloader", "Bootloader", "Bootloader", "Bootloader"]
    ]
]
